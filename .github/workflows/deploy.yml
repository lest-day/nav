name: Build and push dist to gh-pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write   # ✅ 必须有，才能 push 分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: build-gh-pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true   # ✅ 保证 gh-pages 是干净的单分支
